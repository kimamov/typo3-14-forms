<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="formeditor-inspector-element" data-identifier="optionsProviderEditor">
    <div class="form-group">
        <label class="form-label">
            <span data-template-property="label"></span>
        </label>
        <div class="form-description">
            Select a CSV or JSON file from the <code>options_providers</code> directory,
            then click <strong>Apply provider</strong>.
            Options are resolved from this file each time the form is rendered &ndash;
            only a small stub is stored in the form definition.
        </div>
        <div class="mb-2">
            <select class="form-select form-select-sm"
                    data-identifier="optionsProviderFileSelect">
                <option value="">-- loading files --</option>
            </select>
        </div>
        <div class="row mb-2">
            <div class="col">
                <label class="form-label form-label-sm">Value column</label>
                <input type="text"
                       class="form-control form-control-sm"
                       data-identifier="optionsProviderValueColumn"
                       value="value" />
            </div>
            <div class="col">
                <label class="form-label form-label-sm">Label column</label>
                <input type="text"
                       class="form-control form-control-sm"
                       data-identifier="optionsProviderLabelColumn"
                       value="label" />
            </div>
        </div>
        <button type="button" class="btn btn-primary btn-sm"
                data-identifier="optionsProviderApplyBtn">
            Apply provider
        </button>
        <button type="button" class="btn btn-default btn-sm ms-1"
                data-identifier="optionsProviderPreviewBtn">
            Preview options
        </button>
        <button type="button" class="btn btn-danger btn-sm ms-1" style="display:none;"
                data-identifier="optionsProviderClearBtn">
            Remove provider
        </button>
        <div class="form-text mt-1" data-identifier="optionsProviderStatus"></div>
        <div class="mt-2" style="display:none;" data-identifier="optionsProviderPreview"></div>
    </div>
</div>
</html>
