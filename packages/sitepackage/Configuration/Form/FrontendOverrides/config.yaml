name: t13-forms/frontend-overrides
label: 'Sitepackage Form Frontend Overrides'
priority: 200

prototypes:
  standard:
    formEditor:
      formEditorFluidConfiguration:
        partialRootPaths:
          20: 'EXT:sitepackage/Resources/Private/Backend/Partials/FormEditor/'
      dynamicJavaScriptModules:
        additionalViewModelModules:
          10: '@t13-forms/sitepackage/backend/form-editor/options-import-editor.js'
      formEditorPartials:
        Inspector-OptionsProviderEditor: Inspector/OptionsProviderEditor

    formElementsDefinition:
      Form:
        renderingOptions:
          partialRootPaths:
            20: 'EXT:sitepackage/Resources/Private/Frontend/Partials/'
          templateRootPaths:
            20: 'EXT:sitepackage/Resources/Private/Frontend/Templates/'
          useAjax: false

      Text:
        properties:
          clientVariants: null

      Textarea:
        properties:
          clientVariants: null

      SingleSelect:
        formEditor:
          editors:
            290:
              identifier: optionsProvider
              templateName: Inspector-OptionsProviderEditor
              label: 'Options provider file'
              propertyPath: properties.optionsProvider
            550:
              identifier: useCombobox
              templateName: Inspector-CheckboxEditor
              label: 'Use as searchable combobox'
              propertyPath: properties.useCombobox
        properties:
          useCombobox: false
          clientVariants: null
          optionsProvider: null

      MultiSelect:
